name = "ariawiki-pipeline"
main = "src/workers/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ariawiki-pipeline"
database_id = "bdde0102-ca3a-4f05-8edb-f5b3ca6978cd"

# KV Namespace (for prompt templates and config cache)
[[kv_namespaces]]
binding = "KV"
id = "3c1bf493570b4624a46f9e709a656692"

# Cron Triggers
[triggers]
crons = [
  "*/30 * * * *",   # source-fetcher: every 30 minutes
  "0 23 * * *"      # daily-briefing: 7:00 AM UTC+8 = 23:00 UTC
]

# Environment variables (set via wrangler secret)
# ANTHROPIC_API_KEY - Claude API key
# GITHUB_TOKEN - GitHub personal access token
# PIPELINE_API_KEY - API key for draft-api authentication
# GITHUB_REPO - e.g. "username/ariawiki.com"

[vars]
ENVIRONMENT = "production"
